{% extends 'compras/base_compras.html' %}
{% block title %}Eliminar Factura{% endblock %}

{% block content %}
<div class="p-8 text-center">
    <h2 class="text-2xl font-bold mb-4 text-gray-800">¿Deseas eliminar la factura {{ f.numero_factura }}?</h2>
    <p class="text-gray-600 mb-6">Esta acción no se puede deshacer.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg">Eliminar</button>
        <a href="{% url 'compras:lista_facturas' %}" class="bg-gray-300 hover:bg-gray-400 text-gray-800 px-4 py-2 rounded-lg ml-2">Cancelar</a>
    </form>
</div>
{% endblock %}
