<form method="get" class="mb-6 bg-white p-4 rounded-xl shadow border flex flex-wrap gap-4">

    <div class="flex flex-col">
        <label class="text-sm font-semibold">Desde</label>
        <input type="date" name="desde" value="{{ request.GET.desde }}"
               class="border rounded-lg px-3 py-2">
    </div>

    <div class="flex flex-col">
        <label class="text-sm font-semibold">Hasta</label>
        <input type="date" name="hasta" value="{{ request.GET.hasta }}"
               class="border rounded-lg px-3 py-2">
    </div>

    <div class="flex flex-col">
        <label class="text-sm font-semibold">Comparar con año previo</label>
        <select name="comparar" class="border rounded-lg px-3 py-2">
            <option value="">No</option>
            <option value="1" {% if request.GET.comparar == "1" %}selected{% endif %}>Sí</option>
        </select>
    </div>

    <button class="bg-blue-600 text-white px-4 py-2 rounded-lg shadow self-end">
        Aplicar
    </button>
</form>
