{% extends 'base.html' %}
{% load static %}

{% block title %}Nueva Cuenta Contable{% endblock %}

{% block content %}

<div class="p-6">
    <h1 class="text-2xl font-semibold text-gray-800 mb-6">Crear Cuenta Contable</h1>

    <div class="bg-white p-6 shadow rounded-xl">
        <form method="POST">
            {% csrf_token %}

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Código</label>
                    {{ form.codigo }}
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Descripción</label>
                    {{ form.descripcion }}
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Tipo</label>
                    {{ form.tipo }}
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Nivel</label>
                    {{ form.nivel }}
                </div>
            </div>

            <button class="bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700">
                Guardar
            </button>
        </form>
    </div>
</div>

{% endblock %}
