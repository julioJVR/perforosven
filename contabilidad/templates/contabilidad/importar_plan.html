{% extends "core/base_siac.html" %}
{% block title %}Importar Plan de Cuentas{% endblock %}

{% block content %}
<div class="max-w-2xl bg-white p-6 rounded shadow">
    <h2 class="text-xl font-semibold mb-4">Importar Plan de Cuentas desde Excel</h2>

    <form method="post" enctype="multipart/form-data" id="form-import">
        {% csrf_token %}
        <div class="mb-4">
            <label class="block text-sm text-gray-700 mb-2">Archivo (.xlsx)</label>
            <input type="file" name="archivo" accept=".xlsx,.xls" class="block w-full" required />
        </div>

        <div class="mb-4 text-sm text-gray-500">
            Columnas esperadas: <strong>codigo, nombre, tipo</strong> (recomendado: padre_codigo, naturaleza, nivel)
        </div>

        <div class="flex items-center space-x-3">
            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">Subir e importar</button>
            <a href="{% url 'contabilidad:cuentas_list' %}" class="text-gray-600">Cancelar</a>
        </div>

        <!-- progreso simple JS -->
        <div id="progress" class="mt-4 hidden">
            <div class="w-full bg-gray-200 rounded">
                <div id="bar" class="bg-blue-600 text-white text-xs rounded" style="width:0%">0%</div>
            </div>
        </div>
    </form>
</div>

<script>
document.getElementById('form-import').addEventListener('submit', function(e){
    const p = document.getElementById('progress');
    const b = document.getElementById('bar');
    p.classList.remove('hidden');
    // animación falsa por UX. El servidor realiza la import real.
    let pct = 0;
    const t = setInterval(()=> {
        pct += 10;
        if (pct>90) { clearInterval(t); return; }
        b.style.width = pct + '%';
        b.innerText = pct + '%';
    }, 200);
});
</script>
{% endblock %}
